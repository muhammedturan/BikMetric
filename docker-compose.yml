services:
  postgres:
    image: postgres:16-alpine
    container_name: bikmetric-postgres
    environment:
      POSTGRES_DB: bikmetric_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: bikmetric-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  api:
    build:
      context: .
      dockerfile: BikMetric.Api/Dockerfile
    container_name: bikmetric-api
    ports:
      - "5001:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=bikmetric_db;Username=postgres;Password=postgres"
      Jwt__SecretKey: "BikMetric-Super-Secret-Key-2024-Must-Be-Long-Enough"
      Jwt__Issuer: "BikMetric"
      Jwt__Audience: "BikMetric"
      Jwt__ExpirationHours: "8"
      Ollama__BaseUrl: "http://ollama:11434"
      Ollama__Model: "llama3.1:8b"
    depends_on:
      postgres:
        condition: service_healthy

  vue:
    build:
      context: ./BikMetric.Vue
      dockerfile: Dockerfile
    container_name: bikmetric-vue
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: "http://api:8080"
    depends_on:
      - api

volumes:
  postgres_data:
  ollama_data:
